<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>映像編集ポートフォリオ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="slate-tag">● EDIT</div>
  <h1>VIDEO EDITING<br>PORTFOLIO</h1>
  <p class="subtitle">これまで編集を担当させていただいた作品一覧です</p>
</header>

<main>
  <div class="tabs" id="type-tabs">
    <button class="tab-btn active" data-type="all">All</button>
    <button class="tab-btn" data-type="Videos">Videos</button>
    <button class="tab-btn" data-type="Shorts">Shorts</button>
    <button class="tab-btn" data-type="MV">MV</button>
  </div>

  <div class="controls">
    <span class="controls-label">SORT_BY</span>
    <select id="sort-select">
      <option value="date-desc">日付が新しい順</option>
      <option value="date-asc">日付が古い順</option>
      <option value="title-asc">タイトル順（A→Z）</option>
      <option value="category">カテゴリ順</option>
    </select>
  </div>

  <div id="gallery" class="gallery"></div>
</main>

<footer class="site-footer">
  <p>&copy; 2026 Video Portfolio</p>
</footer>

<script src="script.js"></script>
</body>
</html>
